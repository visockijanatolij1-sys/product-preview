<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:wght@400,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="card-image"></div>
        <div class="card-content">
            <p class="content__sub-title">PERFUME</p>
            <h1 class="content__title">Gabrielle Essence Eau De Parfum</h1>
            <p class="content__text">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>

            <div class="content-footer">
                <div class="content-buy">
                    <p class="content-buy__new-price">$149.99</p>
                    <p class="content-buy__old-price">$169.99</p>
                </div>
                <button class="content-button">Add to Cart</button>   
            </div>
        </div>
    </div>
</body>
</html>
